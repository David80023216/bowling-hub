<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bowling Hub 🎳</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎳</text></svg>">
  <style>
    /* ===== CSS Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #1a1a2e;
      --bg-darker: #12121f;
      --bg-card: #0f3460;
      --bg-card-hover: #153d6f;
      --accent: #e94560;
      --accent-orange: #f97316;
      --accent-green: #22c55e;
      --accent-blue: #3b82f6;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border: #1e3a5f;
      --sidebar-w: 240px;
      --radius: 12px;
      --radius-sm: 8px;
    }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      background: var(--bg-darker);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--accent-orange); text-decoration: none; }
    a:hover { text-decoration: underline; }
    input, select, textarea { font-family: inherit; font-size: 0.95rem; }

    /* ===== Auth Modal ===== */
    .auth-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .auth-modal.active { display: flex; }
    .auth-box {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%; max-width: 400px;
      margin: 1rem;
      box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .auth-box h2 { text-align: center; margin-bottom: .5rem; font-size: 1.8rem; }
    .auth-box .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; }
    .auth-box .form-group { margin-bottom: 1rem; }
    .auth-box label { display: block; margin-bottom: .3rem; color: var(--text-muted); font-size: .85rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .auth-box input[type="text"], .auth-box input[type="email"], .auth-box input[type="password"] {
      width: 100%; padding: .75rem 1rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-darker); color: var(--text);
      transition: border-color .2s;
    }
    .auth-box input:focus { outline: none; border-color: var(--accent); }
    .auth-box .btn { width: 100%; margin-top: .5rem; }
    .auth-box .toggle-link { text-align: center; margin-top: 1rem; font-size: .9rem; }

    /* ===== Layout ===== */
    #app-container { display: none; min-height: 100vh; }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: var(--sidebar-w); background: var(--bg-dark);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100; transition: transform .3s;
    }
    .sidebar-brand {
      padding: 1.25rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .6rem;
      font-size: 1.2rem; font-weight: 700;
    }
    .sidebar-brand span { font-size: 1.6rem; }
    .sidebar-nav { flex: 1; padding: .5rem 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: .7rem;
      padding: .75rem 1.25rem; cursor: pointer;
      color: var(--text-muted); transition: all .2s;
      font-weight: 500; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(233,69,96,.08); color: var(--text); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(233,69,96,.1); }
    .nav-item .nav-icon { font-size: 1.2rem; width: 1.5rem; text-align: center; }
    .sidebar-user {
      padding: 1rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: .7rem;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .95rem;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-info .user-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info .user-role { font-size: .75rem; color: var(--text-muted); }
    #logout-btn {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 1.1rem; padding: .3rem; border-radius: 6px; transition: all .2s;
    }
    #logout-btn:hover { color: var(--accent); background: rgba(233,69,96,.15); }

    .main-content {
      margin-left: var(--sidebar-w); padding: 1.5rem 2rem 3rem;
      min-height: 100vh;
    }
    .mobile-header {
      display: none; position: sticky; top: 0; z-index: 50;
      background: var(--bg-dark); border-bottom: 1px solid var(--border);
      padding: .75rem 1rem; align-items: center; gap: .7rem;
    }
    #sidebar-toggle {
      background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: .2rem;
    }
    .mobile-header .brand-text { font-weight: 700; font-size: 1.1rem; }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 90;
    }
    .sidebar-overlay.active { display: block; }

    /* ===== Tab Content ===== */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn .3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== Page Header ===== */
    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 700; }
    .subtitle { color: var(--text-muted); margin-top: .3rem; }

    /* ===== Cards ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    .card h3 { margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: .5rem; }
    .highlight-card { border-color: var(--accent); box-shadow: 0 0 20px rgba(233,69,96,.15); }

    /* ===== Stat Cards ===== */
    .stat-cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-cards-sm { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem; text-align: center;
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.3); }
    .stat-card.accent { border-color: var(--accent); }
    .stat-icon { font-size: 1.5rem; margin-bottom: .4rem; }
    .stat-value { font-size: 2rem; font-weight: 800; line-height: 1.1; }
    .stat-label { color: var(--text-muted); font-size: .8rem; margin-top: .3rem; text-transform: uppercase; letter-spacing: .5px; }

    /* ===== Grid ===== */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

    /* ===== Tables ===== */
    .data-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .data-table th {
      text-align: left; padding: .65rem .75rem;
      color: var(--text-muted); font-size: .75rem;
      text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 2px solid var(--border);
    }
    .data-table td { padding: .65rem .75rem; border-bottom: 1px solid rgba(30,58,95,.5); }
    .data-table tbody tr:nth-child(even) { background: rgba(255,255,255,.02); }
    .data-table tbody tr:hover { background: rgba(233,69,96,.06); }
    .honor-row { background: rgba(249,115,22,.08) !important; }
    .honor-text { color: var(--accent-orange); font-weight: 700; }
    .highlight-row { background: rgba(233,69,96,.12) !important; }
    .action-cell { white-space: nowrap; }
    .data-table { overflow-x: auto; display: block; }
    .standings-table { display: table; }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
      padding: .65rem 1.25rem; border: none; border-radius: var(--radius-sm);
      font-weight: 600; font-size: .9rem; cursor: pointer;
      transition: all .2s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #d63a54; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(233,69,96,.4); }
    .btn-secondary { background: rgba(255,255,255,.1); color: var(--text); }
    .btn-secondary:hover { background: rgba(255,255,255,.18); }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: .4rem .8rem; font-size: .8rem; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; padding: .3rem; border-radius: 6px;
      transition: background .2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,.1); }
    .btn-group { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ===== Forms ===== */
    .form-card { border-color: var(--accent-blue); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; margin-bottom: .3rem; color: var(--text-muted);
      font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .6rem .8rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-darker); color: var(--text);
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .form-group input[type="checkbox"] { width: auto; margin-right: .5rem; }
    .form-actions { display: flex; gap: .75rem; margin-top: 1rem; flex-wrap: wrap; }
    .game-inputs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .game-input { width: 100px !important; text-align: center; font-weight: 700; font-size: 1.1rem !important; }
    .score-calc { font-size: 1rem; color: var(--accent-orange); font-weight: 600; display: flex; gap: 1.5rem; margin: .5rem 0; }
    .filter-row { display: flex; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-row select, .filter-row input { padding: .5rem .7rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-darker); color: var(--text); font-size: .85rem; }

    /* ===== Badges ===== */
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-success { background: rgba(34,197,94,.2); color: var(--accent-green); }
    .badge-pending { background: rgba(249,115,22,.2); color: var(--accent-orange); }
    .badge-danger { background: rgba(220,38,38,.2); color: #f87171; }
    .badge-team { background: rgba(59,130,246,.2); color: var(--accent-blue); }
    .notif-badge {
      background: var(--accent); color: #fff; border-radius: 50%;
      width: 22px; height: 22px; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
    }

    /* ===== Honor Badges ===== */
    .honor-badges { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .honor-badge {
      background: var(--bg-card); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; text-align: center;
      transition: all .3s;
    }
    .honor-badge.earned { border-color: var(--accent-orange); box-shadow: 0 0 20px rgba(249,115,22,.15); }
    .honor-badge.unearned { opacity: .45; }
    .badge-icon { font-size: 2rem; margin-bottom: .3rem; }
    .badge-count { font-size: 1.8rem; font-weight: 800; }
    .badge-label { font-weight: 600; font-size: .9rem; }
    .badge-desc { color: var(--text-muted); font-size: .75rem; margin-top: .2rem; }

    /* ===== League Cards ===== */
    .league-card { padding: 0; overflow: hidden; }
    .league-header {
      padding: 1.25rem 1.5rem; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background .2s;
    }
    .league-header:hover { background: rgba(255,255,255,.03); }
    .league-info h3 { margin-bottom: .3rem; }
    .league-info p { color: var(--text-muted); font-size: .85rem; }
    .league-actions { display: flex; align-items: center; gap: .75rem; }
    .expand-icon { color: var(--text-dim); font-size: .9rem; }
    .sync-time { padding: 0 1.5rem .5rem; font-size: .75rem; color: var(--text-dim); }
    .league-detail { padding: 0 1.5rem 1.5rem; }
    .standings-loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    /* ===== Join Results ===== */
    .join-results { max-height: 250px; overflow-y: auto; }
    .join-result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: .75rem; border-bottom: 1px solid var(--border);
    }
    .join-result-item div { display: flex; flex-direction: column; }
    .join-result-item span { font-size: .8rem; color: var(--text-muted); }

    /* ===== Schedule ===== */
    .schedule-list { display: flex; flex-direction: column; gap: .75rem; }
    .schedule-item {
      display: flex; align-items: center; gap: 1.25rem;
      padding: 1rem; border-radius: var(--radius-sm);
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      transition: all .2s;
    }
    .schedule-item:hover { background: rgba(255,255,255,.06); }
    .schedule-item.this-week { border-color: var(--accent-orange); background: rgba(249,115,22,.06); }
    .schedule-date-block { text-align: center; min-width: 90px; }
    .schedule-day { font-weight: 700; font-size: .85rem; color: var(--accent-orange); }
    .schedule-date { font-size: .8rem; color: var(--text-muted); }
    .schedule-time { font-size: .75rem; color: var(--text-dim); }
    .schedule-details { flex: 1; }
    .schedule-league { font-weight: 600; }
    .schedule-opponent { color: var(--text-muted); font-size: .9rem; }
    .schedule-lanes { color: var(--text-dim); font-size: .8rem; }

    /* ===== Challenges ===== */
    .challenge-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .challenge-card {
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .challenge-card.pending { border-color: var(--accent-orange); }
    .challenge-card.active-challenge { border-color: var(--accent-green); }
    .challenge-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .7rem; }
    .challenge-type-badge {
      background: rgba(233,69,96,.2); color: var(--accent);
      padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .challenge-dates { font-size: .8rem; color: var(--text-muted); }
    .challenge-wager { color: var(--accent-orange); font-size: .9rem; margin-top: .3rem; }
    .challenge-actions { display: flex; gap: .5rem; margin-top: .75rem; }
    .challenge-progress { display: flex; gap: 1.5rem; margin: .75rem 0; }
    .progress-label { font-size: .85rem; color: var(--text-muted); }
    .selected-opponent { color: var(--accent-green); font-size: .9rem; margin-top: .3rem; }
    .search-results {
      max-height: 200px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-top: .3rem; background: var(--bg-darker);
    }
    .search-results:empty { border: none; }
    .search-result-item {
      padding: .6rem .8rem; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .2s;
      display: flex; justify-content: space-between;
    }
    .search-result-item:hover { background: rgba(233,69,96,.1); }
    .types-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: .75rem; }
    .type-card {
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 1rem;
    }
    .type-card h4 { color: var(--accent-orange); margin-bottom: .3rem; }
    .type-card p { color: var(--text-muted); font-size: .85rem; }
    .disclaimer {
      background: rgba(249,115,22,.1); border: 1px solid rgba(249,115,22,.3);
      border-radius: var(--radius-sm); padding: .75rem 1rem; margin: 1rem 0;
      font-size: .85rem; color: var(--accent-orange);
    }

    /* ===== Upcoming (Dashboard) ===== */
    .upcoming-list { display: flex; flex-direction: column; gap: .5rem; }
    .upcoming-item {
      display: flex; gap: 1rem; padding: .6rem;
      border-radius: var(--radius-sm); background: rgba(255,255,255,.03);
    }
    .upcoming-date { color: var(--accent-orange); font-weight: 700; font-size: .85rem; min-width: 80px; }
    .upcoming-details { display: flex; flex-direction: column; }
    .upcoming-details span { color: var(--text-muted); font-size: .85rem; }

    .challenge-list { display: flex; flex-direction: column; gap: .5rem; }
    .challenge-item {
      display: flex; gap: 1rem; align-items: center;
      padding: .6rem; border-radius: var(--radius-sm);
      background: rgba(255,255,255,.03);
    }
    .challenge-type { color: var(--accent); font-weight: 600; min-width: 100px; font-size: .85rem; }
    .challenge-item .challenge-wager { margin-left: auto; }

    /* ===== Empty States ===== */
    .empty-state { color: var(--text-dim); text-align: center; padding: 2rem 1rem; font-style: italic; }
    .text-muted { color: var(--text-muted); }

    /* ===== Skeleton Loaders ===== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,.06) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    .skeleton-title { height: 32px; width: 250px; margin-bottom: 1rem; }
    .skeleton-stat { height: 60px; }
    .skeleton-block { height: 120px; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    /* ===== Spinner ===== */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed; top: 1rem; right: 1rem; z-index: 9999;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .toast {
      padding: .75rem 1.25rem; border-radius: var(--radius-sm);
      font-size: .9rem; font-weight: 500; max-width: 350px;
      animation: slideIn .3s; box-shadow: 0 8px 25px rgba(0,0,0,.4);
    }
    .toast-success { background: var(--accent-green); color: #fff; }
    .toast-error { background: #dc2626; color: #fff; }
    .toast-info { background: var(--accent-blue); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .mobile-header { display: flex; }
      .main-content { margin-left: 0; padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .page-header { flex-direction: column; align-items: flex-start; }
      .page-header h1 { font-size: 1.3rem; }
      .challenge-cards { grid-template-columns: 1fr; }
      .honor-badges { grid-template-columns: repeat(2, 1fr); }
      .data-table { font-size: .8rem; }
      .data-table th, .data-table td { padding: .5rem; }
      .filter-row { flex-direction: column; }
    }
    @media (max-width: 480px) {
      .stat-cards { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Auth Modal -->
  <div class="auth-modal" id="auth-modal">
    <div class="auth-box">
      <h2>🎳 Bowling Hub</h2>
      <p class="auth-subtitle">Track scores, join leagues, challenge friends</p>

      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password">
        </div>
        <button class="btn btn-primary" id="btn-login">Log In</button>
        <p class="toggle-link">Don't have an account? <a href="#" id="toggle-signup">Sign Up</a></p>
      </div>

      <div id="signup-form" style="display:none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe">
        </div>
        <div class="form-group">

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    /* ===== Utility Functions (global) ===== */
    function escHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    /* ===== Toast System ===== */
    const Toast = {
      show(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 3500);
      }
    };
  </script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/scores.js"></script>
  <script src="js/honors.js"></script>
  <script src="js/leagues.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/challenges.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script>
    /* ===== Boot ===== */
    document.addEventListener('DOMContentLoaded', () => {
      Auth.bindEvents();
      Auth.init();
      // App.init is called after auth succeeds (showApp triggers it via observer)
      const observer = new MutationObserver(() => {
        if (document.getElementById('app-container').style.display === 'flex') {
          App.init();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('app-container'), { attributes: true, attributeFilter: ['style'] });
    });
  </script>
